<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>ChatbotHelper</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
    }

    .container {
      width: min(95vw, 1000px);
      height: 95vh;
      display: flex;
      flex-direction: column;
      background: #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
    }

    header {
      padding: 15px;
      background: #333;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    #chat {
      flex: 1;
      padding-left: 10px;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .message {
      white-space: normal;
      max-width: 70%;
      padding: 10px;
      border-radius: 10px;
      line-height: 1.6;
      word-break: break-word;
    }
    .message::first-line {
      text-indent: 0;
    }

    .user {
      align-self: flex-end;
      background: #4a90e2;
    }

    .bot {
      align-self: flex-start;
      background: #444;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #333;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      background: #4a90e2;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #357abd;
    }
  </style>
</head>

<body>

<div class="container">
  <header>ChatbotHelper</header>

  <div id="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Écris ton message..." />
    <button onclick="send()">Envoyer</button>
  </div>
</div>

<script>
function isNearBottom(container) {
  return container.scrollHeight - container.scrollTop - container.clientHeight < 50;
}

function scrollToBottomIfNeeded(container) {
  if (isNearBottom(container)) {
    container.scrollTop = container.scrollHeight;
  }
}
async function send() {
  const input = document.getElementById('input');
  const chat = document.getElementById('chat');

  const message = input.value;
  if (!message) return;

  input.value = "";

  // message utilisateur
  chat.innerHTML += `<div class="message user">${message}</div>`;
  scrollToBottomIfNeeded(chat);

  let dots = 0;

  let loadingElement = document.createElement("div");
  loadingElement.className = "message bot loading";

  const loadingInterval = setInterval(() => {
  dots = (dots % 3) + 1;
  loadingElement.textContent =
      "ChatbotHelper réfléchit" + ".".repeat(dots);
  scrollToBottomIfNeeded(chat);
  }, 200);

  chat.appendChild(loadingElement);
  scrollToBottomIfNeeded(chat);

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    // stop loader
    clearInterval(loadingInterval);

    if (loadingElement?.remove) {
      loadingElement.remove();
    }

    // 💬 créer bulle vide
    const botMessage = document.createElement("div");
    botMessage.className = "message bot";
    chat.appendChild(botMessage);

    // ✨ effet écriture
    let i = 0;
    const text = data.reply;

    function typeWriter() {
      botMessage.innerHTML = formatMarkdown(text.slice(0, i));

      i++;
      scrollToBottomIfNeeded(chat);

      if (i <= text.length) {
        setTimeout(typeWriter, 8);
      }
    }
    function formatMarkdown(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
        .replace(/^- /gm, "• ")
        .replace(/^\d+\. /gm, "• ")
        .replace(/\n\n/g, "<br><br>")
        .replace(/\n/g, "<br>")
    }
    typeWriter();

  } catch (err) {
    clearInterval(loadingInterval);

    if (loadingElement?.remove) {
      loadingElement.remove();
    }

    chat.innerHTML += `<div class="message bot">Erreur serveur</div>`;
  }
}

// envoyer avec Entrée
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
